<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    width:80%;
    max-width:650px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

#message{
    font-size:22px;
    line-height:1.8;
    min-height:220px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.heart{
    position:absolute;
    color:white;
    font-size:25px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ A Message For You ❤️</h1>
    
    <div class="rose">
    🌹
     </div>
    <div id="message"></div>

    <button onclick="showLove()">Click Me ❤️</button>
</div>

<script>

const text =
`"YOU ARE BEAUTIFUL"

"YOU ARE SMART"

"YOU ARE LOVELY"

YOU ARE MY TYPE OF PERSON.

JUST KNOW THAT I LOVED YOU
FROM THE VERY FIRST DAY I SAW YOU. ❤️`;

let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}

typeWriter();

function showLove(){
    alert("❤️ You mean more to me than you know ❤️");
}

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
