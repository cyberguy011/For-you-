<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#60a5fa,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:#1e3a8a;
    color:white;
    width:90%;
    max-width:700px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:20px;
}

#rose{
    font-size:100px;
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

    .line{
    opacity:0;
    font-size:20px;
    margin:12px 0;
    transition:opacity 2s ease-in-out;
        
}

#photoReveal{
    opacity:0;
    transition:opacity 3s ease-in-out;
    margin-top:25px;
}

#showBtn{
    background:white;
    color:#1e3a8a;
    border:none;
    padding:15px 25px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

#photoContainer{
    display:none;
    margin-top:20px;
}

#photoContainer img{
    width:100%;
    max-width:350px;
    height:auto;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

#photoContainer img{
    width:100%;
    max-width:500px;
    height:auto;
    
}

.heart{
    position:absolute;
    color:white;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">

<h1>❤️ For Someone Special ❤️</h1>

<div id="rose">🌹</div>

<p class="line">you are beautiful</p>
<p class="line">you are smart</p>
<p class="line">you are lovely</p>
<p class="line">you are my type of person</p>
<p class="line">just know that i loved you</p>
<p class="line">from the very first day i saw you</p>
<p class="line">🌹 a message from your tech friend 🌹</p>
<div id="photoReveal">

<button id="showBtn" onclick="showPhoto()">
💙 TAP TO VIEW THE SENDER'S IMAGE 💙
</button>

<div id="photoContainer">
    <img src="me.jpg" alt="Tech Friend">
    <p>❤️ This is the guy who coded all of this for you ❤️</p>
</div>

</div>

</div>

<script>

const lines = document.querySelectorAll(".line");

lines.forEach((line,index)=>{
    setTimeout(()=>{
        line.style.opacity="1";
    },4000*(index+1));
});

setTimeout(()=>{
    document.getElementById("photoReveal").style.opacity="1";
},30000);

function showPhoto(){
    document.getElementById("photoContainer").style.display="block";
    document.getElementById("showBtn").style.display="none";
}

function createHeart(){
    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(20+Math.random()*30)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
