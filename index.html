<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:700px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
}

#rose{
    font-size:120px;
    animation:pulse 2s infinite;
    margin-bottom:20px;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

.line{
    opacity:0;
    font-size:24px;
    margin:15px 0;
    color:#444;
    transition:opacity 2s ease-in-out;
}

#photoReveal{
    opacity:0;
    margin-top:30px;
    transition:opacity 3s ease-in-out;
}

#photoReveal img{
    width:230px;
    max-width:90%;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#photoReveal p{
    margin-top:15px;
    font-size:20px;
    color:#ff4d6d;
    font-weight:bold;
}

.heart{
    position:absolute;
    color:white;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">

<h1>❤️ For Someone Special ❤️</h1>

<div id="rose">🌹</div>

<p class="line">YOU ARE BEAUTIFUL</p>

<p class="line">YOU ARE SMART</p>

<p class="line">YOU ARE LOVELY</p>

<p class="line">YOU ARE MY TYPE OF PERSON</p>

<p class="line">JUST KNOW THAT I LOVED YOU</p>

<p class="line">FROM THE VERY FIRST DAY I SAW YOU</p>

<p class="line">🌹 A MESSAGE FROM YOUR TECH FRIEND 🌹</p>

<div id="photoReveal">
    <img src="me.jpg" alt="Tech Friend">
</div>

</div>

<script>

const lines = document.querySelectorAll(".line");

lines.forEach((line,index)=>{
    setTimeout(()=>{
        line.style.opacity="1";
    },4000*(index+1));
});

setTimeout(()=>{
    document.getElementById("photoReveal").style.opacity="1";
},30000);

function createHeart(){
    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(20+Math.random()*30)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
